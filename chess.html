<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess P2P | N1zyx3</title>
    
    <link rel="stylesheet" href="../../styles/main.css"> <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="styles/chess.css">
</head>
<body>

    <div class="chess-wrapper">
        <div id="myBoard"></div>

        <div class="controls">
            <div class="id-row">Ваш ID: <span id="my-id" class="id-text">Загрузка...</span></div>
            <div class="input-group">
                <input type="text" id="peer-id" placeholder="ID друга">
                <button id="connect-btn">Подключиться</button>
            </div>
            <div id="status" class="status-msg">Ожидание противника...</div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/chess.js@0.10.3/chess.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    
    <script src="js/chess.js"></script>
</body>
</html>
